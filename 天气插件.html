.weather-icon.rainy-anim { animation: iconBounce 1.2s ease-in-out infinite; }
.weather-icon.snowy-anim { animation: iconFloat 3.5s ease-in-out infinite; }
.weather-icon.foggy-anim { animation: iconFade 3.5s ease-in-out infinite; }
.weather-icon.storm-anim { animation: iconFlash 2s ease-in-out infinite; }
.weather-icon.night-anim { animation: iconGlow 4s ease-in-out infinite; }

.city-btn {

    'ж–°з–Ҷ': ['д№ҢйІҒжңЁйҪҗ', 'е…ӢжӢүзҺӣдҫқ', 'еҗҗйІҒз•Ә', 'е“ҲеҜҶ', 'жҳҢеҗү', 'еә“е°”еӢ’', 'йҳҝе…ӢиӢҸ', 'е–Җд»Җ', 'дјҠе®Ғ'],
    'йҰҷжёҜ': ['йҰҷжёҜ'],
    'жҫій—Ё': ['жҫій—Ё'],
    'еҸ°ж№ҫ': ['еҸ°еҢ—', 'й«ҳйӣ„', 'еҸ°дёӯ', 'еҸ°еҚ—']
};

const weatherDesc = {
    0:{text:'жҷҙжң—',icon:'вҳҖпёҸ'},1:{text:'е°‘дә‘',icon:'рҹҢӨпёҸ'},2:{text:'еӨҡдә‘',icon:'вӣ…'},3:{text:'йҳҙ',icon:'вҳҒпёҸ'},
    45:{text:'йӣҫ',icon:'рҹҢ«пёҸ'},48:{text:'йӣҫ',icon:'рҹҢ«пёҸ'},51:{text:'жҜӣжҜӣйӣЁ',icon:'рҹҢҰпёҸ'},53:{text:'жҜӣжҜӣйӣЁ',icon:'рҹҢҰпёҸ'},
    55:{text:'еӨ§йӣЁ',icon:'рҹҢ§пёҸ'},56:{text:'еҶ»йӣЁ',icon:'рҹҢ§пёҸ'},57:{text:'еҶ»йӣЁ',icon:'рҹҢ§пёҸ'},
    61:{text:'е°ҸйӣЁ',icon:'рҹҢҰпёҸ'},63:{text:'дёӯйӣЁ',icon:'рҹҢ§пёҸ'},65:{text:'еӨ§йӣЁ',icon:'рҹҢ§пёҸ'},
    66:{text:'еҶ»йӣЁ',icon:'рҹҢ§пёҸ'},67:{text:'еҶ»йӣЁ',icon:'рҹҢ§пёҸ'},
    71:{text:'е°ҸйӣӘ',icon:'вқ„пёҸ'},73:{text:'дёӯйӣӘ',icon:'вқ„пёҸ'},75:{text:'еӨ§йӣӘ',icon:'вқ„пёҸ'},77:{text:'йӣӘзІ’',icon:'вқ„пёҸ'},
    80:{text:'йҳөйӣЁ',icon:'рҹҢҰпёҸ'},81:{text:'йҳөйӣЁ',icon:'рҹҢ§пёҸ'},82:{text:'еӨ§йҳөйӣЁ',icon:'рҹҢ§пёҸ'},
    85:{text:'йҳөйӣӘ',icon:'вқ„пёҸ'},86:{text:'йҳөйӣӘ',icon:'вқ„пёҸ'},
    95:{text:'йӣ·йҳөйӣЁ',icon:'вӣҲпёҸ'},96:{text:'йӣ·йҳөйӣЁдјҙеҶ°йӣ№',icon:'вӣҲпёҸ'},99:{text:'йӣ·йҳөйӣЁдјҙеҶ°йӣ№',icon:'вӣҲпёҸ'}
};

const backgrounds = {
    sunny: 'linear-gradient(135deg, #2980b9, #6dd5fa, #ffffff)',
    cloudy: 'linear-gradient(135deg, #636e72, #a0a8b0, #d5dbe0)',
    rainy: 'linear-gradient(135deg, #1e272e, #3d4a5a, #6b8ba4)',
    snowy: 'linear-gradient(135deg, #a8b8c8, #d0d8e0, #f0f2f5)',
    foggy: 'linear-gradient(135deg, #8a929a, #b8c0c8, #d8dce0)',
    storm: 'linear-gradient(135deg, #0f0f23, #1a1a3e, #2d1f4e)',
    night: 'linear-gradient(135deg, #0c0c1d, #151540, #252550)'
};

const coordCache = {};
let currentProv = localStorage.getItem('weatherProv') || 'е№ҝдёң';
let currentCity = localStorage.getItem('weatherCity') || 'е№ҝе·һ';
let menuOpen = false;

if (!provinceCities[currentProv]) { currentProv = 'е№ҝдёң'; currentCity = 'е№ҝе·һ'; }
if (!provinceCities[currentProv].includes(currentCity)) { currentCity = provinceCities[currentProv][0]; }

const cityBtn = document.getElementById('cityBtn');
const dropdown = document.getElementById('cityDropdown');
const provLevel = document.getElementById('provinceLevel');
const cityLevel = document.getElementById('cityLevel');
const cityList = document.getElementById('cityList');
const menuBack = document.getElementById('menuBack');

function buildProvinceMenu() {
    provLevel.innerHTML = '';
    for (const prov of Object.keys(provinceCities)) {
        const el = document.createElement('div');
        el.className = 'menu-item' + (prov === currentProv ? ' active' : '');
        el.textContent = prov;
        el.addEventListener('click', (e) => { e.stopPropagation(); showCities(prov); });
        provLevel.appendChild(el);
    }
}

function showCities(prov) {
    provLevel.classList.remove('active');
    cityLevel.classList.add('active');
    cityList.innerHTML = '';
    for (const c of provinceCities[prov]) {
        const el = document.createElement('div');
        el.className = 'menu-item' + (c === currentCity ? ' active' : '');
        el.textContent = c;
        el.addEventListener('click', (e) => { e.stopPropagation(); selectCity(prov, c); });
        cityList.appendChild(el);
    }
}

function selectCity(prov, city) {
    currentProv = prov; currentCity = city;
    localStorage.setItem('weatherProv', prov);
    localStorage.setItem('weatherCity', city);
    cityBtn.textContent = city + ' в–ҫ';
    closeMenu(); fetchWeather();
}

function showProvince() {
    cityLevel.classList.remove('active');
    provLevel.classList.add('active');
}

function toggleMenu() {
    if (menuOpen) { closeMenu(); return; }
    dropdown.classList.add('open'); menuOpen = true;
    provLevel.classList.add('active'); cityLevel.classList.remove('active');
}

function closeMenu() { dropdown.classList.remove('open'); menuOpen = false; }

cityBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleMenu(); });
menuBack.addEventListener('click', (e) => { e.stopPropagation(); showProvince(); });
document.addEventListener('click', () => closeMenu());
dropdown.addEventListener('click', (e) => e.stopPropagation());

buildProvinceMenu();
cityBtn.textContent = currentCity + ' в–ҫ';

async function getCoords(city) {
    if (coordCache[city]) return coordCache[city];
    try {
        const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh`);
        const d = await r.json();
        if (d.results && d.results[0]) {
            coordCache[city] = { lat: d.results[0].latitude, lon: d.results[0].longitude };
            return coordCache[city];
        }
    } catch {}
    return null;
}

function updateTime() {
    const now = new Date();
    document.getElementById('time').textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    document.getElementById('date').textContent = `${now.getFullYear()}е№ҙ${now.getMonth()+1}жңҲ${now.getDate()}ж—Ҙ ${['жҳҹжңҹж—Ҙ','жҳҹжңҹдёҖ','жҳҹжңҹдәҢ','жҳҹжңҹдёү','жҳҹжңҹеӣӣ','жҳҹжңҹдә”','жҳҹжңҹе…ӯ'][now.getDay()]}`;
}

async function fetchWeather() {
    if (!currentCity) return;
    const coords = await getCoords(currentCity);
    if (!coords) { document.getElementById('error').textContent = 'ж— жі•иҺ·еҸ–еҹҺеёӮеқҗж Ү'; return; }
    try {
        const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,is_day&daily=temperature_2m_max,temperature_2m_min,weather_code&forecast_days=3&timezone=auto`);
        if (!r.ok) throw new Error();
        const data = await r.json(); updateWeatherUI(data); updateForecastUI(data);
    } catch { document.getElementById('error').textContent = 'еҠ иҪҪеӨұиҙҘ'; }
}

function getWeatherType(code, isDay) {
    if (!isDay) return 'night';
    if (code === 0) return 'sunny';
    if (code >= 1 && code <= 3) return 'cloudy';
    if ((code >= 71 && code <= 77) || (code >= 85 && code <= 86)) return 'snowy';
    if (code >= 95) return 'storm';
    if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) return 'rainy';
    if (code >= 45 && code <= 48) return 'foggy';
    return 'cloudy';
}

function updateWeatherUI(data) {
    const c = data.current;
    const type = getWeatherType(c.weather_code, data.current.is_day);
    const info = weatherDesc[c.weather_code] || { text: 'жңӘзҹҘ', icon: 'рҹҢЎпёҸ' };

    document.body.style.background = backgrounds[type];

    const sun = document.getElementById('sun'), moon = document.getElementById('moon');
    const clouds = [document.getElementById('cloud1'),document.getElementById('cloud2'),document.getElementById('cloud3')];
    const fog = document.getElementById('fogLayer'), lightning = document.getElementById('lightning');
    const rainL = document.getElementById('rainLayer'), snowL = document.getElementById('snowLayer');
    const starsC = document.getElementById('starsContainer');

    sun.classList.toggle('visible', type === 'sunny');
    moon.classList.toggle('visible', type === 'night');
    clouds.forEach(c => c.classList.toggle('visible', type === 'cloudy'));
    fog.classList.toggle('visible', type === 'foggy' || type === 'snowy');
    lightning.classList.toggle('visible', type === 'storm');

    rainL.innerHTML = ''; snowL.innerHTML = ''; starsC.innerHTML = '';
    rainL.classList.remove('visible'); snowL.classList.remove('visible');

    if (type === 'rainy' || type === 'storm') {
        rainL.classList.add('visible');
        const n = type === 'storm' ? 120 : 80;
        for (let i = 0; i < n; i++) {
            const d = document.createElement('div'); d.className = 'raindrop';
            d.style.left = Math.random()*100+'%';
            d.style.animationDuration = (0.4+Math.random()*0.8)+'s';
            d.style.animationDelay = Math.random()*2+'s';
            d.style.height = (12+Math.random()*18)+'px';
            rainL.appendChild(d);
        }
    }
    if (type === 'snowy') {
        snowL.classList.add('visible');
        for (let i = 0; i < 60; i++) {
            const f = document.createElement('div'); f.className = 'snowflake';
            f.style.left = Math.random()*100+'%';
            f.style.animationDuration = (3+Math.random()*4)+'s';
            f.style.animationDelay = Math.random()*3+'s';
            f.style.width = f.style.height = (4+Math.random()*8)+'px';
            snowL.appendChild(f);
        }
    }
    if (type === 'night') {
        for (let i = 0; i < 80; i++) {
            const s = document.createElement('div'); s.className = 'star';
            s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*60+'%';
            s.style.animationDelay = Math.random()*3+'s';
            s.style.animationDuration = (1.5+Math.random()*2)+'s';
            starsC.appendChild(s);
        }
    }

    document.getElementById('weatherIcon').className = 'weather-icon ' + type + '-anim';
    document.getElementById('weatherIcon').textContent = info.icon;
    document.getElementById('temperature').innerHTML = `${Math.round(c.temperature_2m)}<span>В°C</span>`;
    document.getElementById('weatherDesc').textContent = info.text === 'жңӘзҹҘ' ? currentCity : `${currentCity} - ${info.text}`;
    document.getElementById('feelsLike').textContent = `${Math.round(c.apparent_temperature)}В°C`;
    document.getElementById('humidity').textContent = `${c.relative_humidity_2m}%`;
    document.getElementById('windSpeed').textContent = `${Math.round(c.wind_speed_10m)}km/h`;
    document.getElementById('error').textContent = '';
}

function getDayLabel(d) {
    const date=new Date(d+'T00:00:00'),today=new Date(); today.setHours(0,0,0,0);
    const diff=Math.round((date-today)/86400000);
    if(diff===0) return 'д»ҠеӨ©'; if(diff===1) return 'жҳҺеӨ©'; if(diff===2) return 'еҗҺеӨ©';
    return ['е‘Ёж—Ҙ','е‘ЁдёҖ','е‘ЁдәҢ','е‘Ёдёү','е‘Ёеӣӣ','е‘Ёдә”','е‘Ёе…ӯ'][date.getDay()];
}

function updateForecastUI(data) {
    for (let i = 0; i < 3; i++) {
        const info = weatherDesc[data.daily.weather_code[i]] || { icon: 'рҹҢЎпёҸ' };
        document.getElementById(`forecastDate${i}`).textContent = getDayLabel(data.daily.time[i]);
        document.getElementById(`forecastIcon${i}`).textContent = info.icon;
        document.getElementById(`forecastTemp${i}`).textContent = `${Math.round(data.daily.temperature_2m_max[i])}В°/${Math.round(data.daily.temperature_2m_min[i])}В°`;
    }
}

updateTime();
setInterval(updateTime, 1000);
fetchWeather();
setInterval(fetchWeather, 600000);
</script>
